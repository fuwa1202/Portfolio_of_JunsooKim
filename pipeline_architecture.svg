<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #2c2c2a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
      .arr { stroke: #888780; stroke-width: 1.2; fill: none; }
      .sep { stroke: #b4b2a9; stroke-width: 0.5; }
      .box-gray   { fill: #f1efe8; stroke: #888780; }
      .box-purple { fill: #eeedfe; stroke: #7f77dd; }
      .box-teal   { fill: #e1f5ee; stroke: #1d9e75; }
      .box-coral  { fill: #faece7; stroke: #d85a30; }
      .box-blue   { fill: #e6f1fb; stroke: #378add; }
      .box-amber  { fill: #faeeda; stroke: #ba7517; }
      .t-purple { fill: #3c3489; }
      .t-teal   { fill: #085041; }
      .t-coral  { fill: #993c1d; }
      .t-blue   { fill: #0c447c; }
      .t-amber  { fill: #633806; }
      .t-gray   { fill: #444441; }
      .ts-purple { fill: #534ab7; font-size: 12px; }
      .ts-teal   { fill: #0f6e56; font-size: 12px; }
      .ts-coral  { fill: #993c1d; font-size: 12px; }
      .ts-blue   { fill: #185fa5; font-size: 12px; }
      .ts-amber  { fill: #854f0b; font-size: 12px; }
      .ts-gray   { fill: #5f5e5a; font-size: 12px; }
      .legend-label { font-size: 12px; fill: #5f5e5a; }
    </style>
  </defs>

  <!-- Input -->
  <rect x="230" y="20" width="220" height="44" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th t-gray" x="340" y="42" text-anchor="middle" dominant-baseline="central">Input: .pdb / .cif files</text>

  <line x1="340" y1="64" x2="340" y2="92" class="arr" marker-end="url(#arrow)"/>

  <!-- Preprocessing -->
  <rect x="190" y="92" width="300" height="54" rx="8" stroke-width="0.5" class="box-purple"/>
  <text class="th t-purple" x="340" y="112" text-anchor="middle" dominant-baseline="central">Structure preprocessing</text>
  <text class="ts-purple" x="340" y="132" text-anchor="middle" dominant-baseline="central">chain parsing · renumbering · HETATM removal</text>

  <!-- Fan-out -->
  <line x1="340" y1="146" x2="340" y2="166" class="sep"/>
  <line x1="60"  y1="166" x2="620" y2="166" class="sep"/>
  <line x1="60"  y1="166" x2="60"  y2="194" class="arr" marker-end="url(#arrow)"/>
  <line x1="172" y1="166" x2="172" y2="194" class="arr" marker-end="url(#arrow)"/>
  <line x1="284" y1="166" x2="284" y2="194" class="arr" marker-end="url(#arrow)"/>
  <line x1="396" y1="166" x2="396" y2="194" class="arr" marker-end="url(#arrow)"/>
  <line x1="508" y1="166" x2="508" y2="194" class="arr" marker-end="url(#arrow)"/>
  <line x1="620" y1="166" x2="620" y2="194" class="arr" marker-end="url(#arrow)"/>

  <!-- ThermoMPNN -->
  <rect x="10" y="194" width="100" height="66" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th t-teal" x="60" y="216" text-anchor="middle" dominant-baseline="central">ThermoMPNN</text>
  <text class="ts-teal" x="60" y="236" text-anchor="middle" dominant-baseline="central">Thermal</text>
  <text class="ts-teal" x="60" y="250" text-anchor="middle" dominant-baseline="central">stability</text>

  <!-- GATSol -->
  <rect x="122" y="194" width="100" height="66" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th t-teal" x="172" y="216" text-anchor="middle" dominant-baseline="central">GATSol</text>
  <text class="ts-teal" x="172" y="236" text-anchor="middle" dominant-baseline="central">Structural</text>
  <text class="ts-teal" x="172" y="250" text-anchor="middle" dominant-baseline="central">solubility</text>

  <!-- Aggrescan -->
  <rect x="234" y="194" width="100" height="66" rx="8" stroke-width="0.5" class="box-coral"/>
  <text class="th t-coral" x="284" y="216" text-anchor="middle" dominant-baseline="central">Aggrescan</text>
  <text class="ts-coral" x="284" y="236" text-anchor="middle" dominant-baseline="central">Aggregation</text>
  <text class="ts-coral" x="284" y="250" text-anchor="middle" dominant-baseline="central">classic</text>

  <!-- AggNet -->
  <rect x="346" y="194" width="100" height="66" rx="8" stroke-width="0.5" class="box-coral"/>
  <text class="th t-coral" x="396" y="216" text-anchor="middle" dominant-baseline="central">AggNet</text>
  <text class="ts-coral" x="396" y="236" text-anchor="middle" dominant-baseline="central">Aggregation</text>
  <text class="ts-coral" x="396" y="250" text-anchor="middle" dominant-baseline="central">DL-based</text>

  <!-- NetSolP -->
  <rect x="458" y="194" width="100" height="66" rx="8" stroke-width="0.5" class="box-blue"/>
  <text class="th t-blue" x="508" y="216" text-anchor="middle" dominant-baseline="central">NetSolP</text>
  <text class="ts-blue" x="508" y="236" text-anchor="middle" dominant-baseline="central">E. coli</text>
  <text class="ts-blue" x="508" y="250" text-anchor="middle" dominant-baseline="central">expression</text>

  <!-- MixMHC -->
  <rect x="570" y="194" width="100" height="66" rx="8" stroke-width="0.5" class="box-amber"/>
  <text class="th t-amber" x="620" y="208" text-anchor="middle" dominant-baseline="central">MixMHCpred</text>
  <text class="th t-amber" x="620" y="226" text-anchor="middle" dominant-baseline="central">MixMHC2pred</text>
  <text class="ts-amber" x="620" y="248" text-anchor="middle" dominant-baseline="central">Immunogenicity</text>

  <!-- Fan-in -->
  <line x1="60"  y1="260" x2="60"  y2="338" class="sep"/>
  <line x1="172" y1="260" x2="172" y2="338" class="sep"/>
  <line x1="284" y1="260" x2="284" y2="338" class="sep"/>
  <line x1="396" y1="260" x2="396" y2="338" class="sep"/>
  <line x1="508" y1="260" x2="508" y2="338" class="sep"/>
  <line x1="620" y1="260" x2="620" y2="338" class="sep"/>
  <line x1="60"  y1="338" x2="620" y2="338" class="sep"/>
  <line x1="340" y1="338" x2="340" y2="366" class="arr" marker-end="url(#arrow)"/>

  <!-- Summary -->
  <rect x="160" y="366" width="360" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text class="th t-purple" x="340" y="386" text-anchor="middle" dominant-baseline="central">Summary report</text>
  <text class="ts-purple" x="340" y="406" text-anchor="middle" dominant-baseline="central">Excel + TSV with PASS/FAIL interpretation + heatmaps</text>

  <!-- Legend -->
  <rect x="108" y="454" width="12" height="12" rx="2" class="box-teal" stroke-width="0.5"/>
  <text class="legend-label" x="126" y="465">Solubility</text>
  <rect x="208" y="454" width="12" height="12" rx="2" class="box-coral" stroke-width="0.5"/>
  <text class="legend-label" x="226" y="465">Aggregation</text>
  <rect x="322" y="454" width="12" height="12" rx="2" class="box-blue" stroke-width="0.5"/>
  <text class="legend-label" x="340" y="465">Expression</text>
  <rect x="428" y="454" width="12" height="12" rx="2" class="box-amber" stroke-width="0.5"/>
  <text class="legend-label" x="446" y="465">Immunogenicity</text>
</svg>
